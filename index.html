  <!-- CSS yang sudah diperbaiki -->
  <style amp-custom>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Poppins', sans-serif;
      background-image: url(https://user15085.na.imgto.link/public/20260624/fiksiniya.avif);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center; /* Agar kartu persis di tengah layar */
      padding: 20px 10px;
    }

    .container {
      width: 100%;
      max-width: 450px;
      margin: 0 auto;
    }

    /* Card (Tabel) lebih gelap dan memiliki border emas */
    .card {
      background: rgba(10, 10, 10, 0.85); /* Lebih gelap agar konten menonjol */
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 24px;
      padding: 30px 20px;
      border: 2px solid rgba(255, 215, 0, 0.3); /* Border emas tipis */
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(0, 0, 0, 0.5);
    }

    header {
      display: flex;
      justify-content: center;
      margin-bottom: 25px;
    }

    .logo {
      filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.5));
      transition: transform 0.3s ease;
    }
    .logo:hover { transform: scale(1.05); }

    .title-wrap {
      text-align: center;
      margin-bottom: 25px;
    }

    .title-wrap h1 {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.4;
      /* Gradient Emas ke Putih agar terlihat elegan */
      background: linear-gradient(to right, #FFD700, #FFFFFF, #FFD700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 50px;
      text-decoration: none;
      text-align: center;
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 25px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Tombol dengan warna emas mencolok agar mudah dilihat */
    .btn-primary {
      background: linear-gradient(135deg, #FFD700 0%, #FFC107 50%, #FFD700 100%);
      color: #000000;
      box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 215, 0, 0.6);
    }

    /* Memperjelas Gambar Tengah (Hero) */
    .hero {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.3), 0 10px 20px rgba(0,0,0,0.5); /* Tambahkan cahaya di sekitar gambar */
      border: 2px solid rgba(255, 255, 255, 0.15); /* Border pemisah */
      background: #000;
    }
  </style>

<body>
  <div class="container">

        Mainkan Sekarang juga
